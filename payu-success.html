<!DOCTYPE html>
<html>
<head>
    <title>Payment Success - BookMyGame</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script>
        // Initialize Firebase with same config as main app
        const firebaseConfig = {
            apiKey: "AIzaSyDKcDIcdXgfBPGPnE74xDptJ-OyJLAi3NA",
            authDomain: "bookmygame-2149d.firebaseapp.com",
            projectId: "bookmygame-2149d",
            storageBucket: "bookmygame-2149d.firebasestorage.app",
            messagingSenderId: "856468226596",
            appId: "1:856468226596:web:51b7b1e9676c07950d0eb1"
        };
        firebase.initializeApp(firebaseConfig);
        
        // Parse URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const txnId = urlParams.get('txnid');
        const amount = urlParams.get('amount');
        const productInfo = urlParams.get('productinfo');
        const firstName = urlParams.get('firstname');
        const email = urlParams.get('email');
        const udf1 = urlParams.get('udf1');
        const udf2 = urlParams.get('udf2');
        const udf3 = urlParams.get('udf3');
        const hash = urlParams.get('hash');
        
        // Store payment result in localStorage and redirect
        if (txnId && hash) {
            localStorage.setItem('payuPaymentResult', JSON.stringify({
                success: true,
                txnId: txnId,
                amount: amount,
                productInfo: productInfo,
                firstName: firstName,
                email: email,
                udf1: udf1,
                udf2: udf2,
                udf3: udf3,
                hash: hash
            }));
            window.location.href = '/index.html';
        } else {
            window.location.href = '/index.html';
        }
    </script>
</head>
<body>
    <div style="text-align: center; padding: 50px;">
        <h2>Processing Payment...</h2>
        <div class="loader"></div>
    </div>
</body>
</html>
