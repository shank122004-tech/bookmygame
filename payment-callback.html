<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Processing - BookMyGame</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .payment-container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 90%;
        }
        .loader {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .success {
            color: #10b981;
            font-size: 48px;
            margin-bottom: 20px;
        }
        .error {
            color: #ef4444;
            font-size: 48px;
            margin-bottom: 20px;
        }
        h2 {
            margin: 20px 0 10px;
            color: #333;
        }
        p {
            color: #666;
            margin-bottom: 20px;
        }
        .button {
            display: inline-block;
            padding: 12px 24px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            margin-top: 20px;
            transition: transform 0.2s;
        }
        .button:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="payment-container">
        <div id="loading" style="display: block;">
            <div class="loader"></div>
            <h2>Processing Payment</h2>
            <p>Please wait while we verify your payment...</p>
        </div>
        <div id="success" style="display: none;">
            <div class="success">✓</div>
            <h2>Payment Successful!</h2>
            <p>You have successfully joined the match.</p>
            <a href="/" class="button">Return to Home</a>
        </div>
        <div id="error" style="display: none;">
            <div class="error">✗</div>
            <h2>Payment Failed</h2>
            <p>There was an issue processing your payment. Please try again.</p>
            <a href="/" class="button">Return to Home</a>
        </div>
    </div>

    <script>
        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const matchId = urlParams.get('matchId');
        const transactionId = urlParams.get('transactionId');
        const code = urlParams.get('code');
        
        // Store payment result in localStorage for the main app to process
        if (code === 'PAYMENT_SUCCESS') {
            localStorage.setItem('matchPaymentResult', JSON.stringify({
                success: true,
                matchId: matchId,
                transactionId: transactionId,
                timestamp: new Date().toISOString()
            }));
            document.getElementById('loading').style.display = 'none';
            document.getElementById('success').style.display = 'block';
        } else {
            localStorage.setItem('matchPaymentResult', JSON.stringify({
                success: false,
                matchId: matchId,
                transactionId: transactionId,
                error: code || 'Payment failed',
                timestamp: new Date().toISOString()
            }));
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'block';
        }
        
        // Redirect to main app after 3 seconds for success
        if (code === 'PAYMENT_SUCCESS') {
            setTimeout(() => {
                window.location.href = '/';
            }, 3000);
        }
    </script>
</body>
</html>
